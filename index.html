
  <!DOCTYPE html>
  <html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapTap Challenge Dashboard</title>
    <style>
      body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
      .container { max-width: 900px; margin: auto; }
      h1 { color: #38bdf8; text-align: center; }
      .card { background: rgba(30, 41, 59, 0.7); border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(10px); }
      table { width: 100%; border-collapse: collapse; margin-top: 10px; }
      th { text-align: left; color: #94a3b8; border-bottom: 1px solid #334155; padding: 10px; }
      td { padding: 10px; border-bottom: 1px solid #1e293b; }
      .win { color: #f59e0b; font-weight: bold; }
      .highlight { color: #38bdf8; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>MapTap Challenge Dashboard</h1>
      <p style="text-align:center">Letztes Update: 2026-05-07 23:59</p>
      
      <div class="card">
        <h2>🏆 Tagesergebnisse</h2>
        <table>
          <tr><th>Platz</th><th>Name</th><th>Score</th></tr>
          
        </table>
      </div>

      <div class="card">
        <h2>📊 Monatswertung (Gesamt)</h2>
        <table>
          <tr><th>Name</th><th>Punkte</th><th>Siege</th><th>Tage</th><th>Schnitt</th></tr>
          
        </table>
      </div>
    </div>
  </body>
  </html>
